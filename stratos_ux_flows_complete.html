<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  body {
    font-family: var(--font-sans);
    color: var(--color-text-primary)
  }

  .wrap {
    padding: 1rem 0
  }

  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center
  }

  .search-bar input {
    flex: 1;
    padding: 8px 12px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-size: 13px;
    font-family: var(--font-sans)
  }

  .search-bar input::placeholder {
    color: var(--color-text-tertiary)
  }

  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 18px
  }

  .pill {
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    transition: all .15s
  }

  .pill:hover,
  .pill.on {
    border-color: var(--color-border-primary);
    background: var(--color-background-primary);
    color: var(--color-text-primary)
  }

  .pill.on {
    font-weight: 500
  }

  .section {
    margin-bottom: 6px
  }

  .sec-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    user-select: none;
    transition: border-color .15s
  }

  .sec-header:hover {
    border-color: var(--color-border-secondary)
  }

  .sec-left {
    display: flex;
    align-items: center;
    gap: 10px
  }

  .sec-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0
  }

  .sec-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary)
  }

  .sec-count {
    font-size: 11px;
    color: var(--color-text-tertiary)
  }

  .sec-arrow {
    font-size: 11px;
    color: var(--color-text-tertiary);
    transition: transform .2s
  }

  .sec-arrow.open {
    transform: rotate(90deg)
  }

  .sec-body {
    display: none;
    padding: 2px 0 4px 0
  }

  .sec-body.open {
    display: block
  }

  .flow-card {
    margin: 3px 0;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    overflow: hidden
  }

  .flow-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    cursor: pointer;
    background: var(--color-background-primary);
    transition: background .1s
  }

  .flow-header:hover {
    background: var(--color-background-secondary)
  }

  .flow-left {
    display: flex;
    align-items: center;
    gap: 10px
  }

  .flow-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.4px;
    font-family: var(--font-mono);
    flex-shrink: 0
  }

  .flow-name {
    font-size: 13px;
    color: var(--color-text-primary);
    font-weight: 500
  }

  .flow-toggle {
    font-size: 11px;
    color: var(--color-text-tertiary);
    transition: transform .2s
  }

  .flow-toggle.open {
    transform: rotate(90deg)
  }

  .flow-body {
    display: none;
    padding: 10px 12px 12px;
    border-top: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary)
  }

  .flow-body.open {
    display: block
  }

  .happy-path {
    margin-bottom: 10px
  }

  .hp-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--color-text-success);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-family: var(--font-mono);
    margin-bottom: 6px
  }

  .hp-steps {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px
  }

  .hp-step {
    font-size: 12px;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    padding: 3px 8px;
    border-radius: 4px;
    border: 0.5px solid var(--color-border-tertiary)
  }

  .hp-arr {
    font-size: 11px;
    color: var(--color-text-tertiary)
  }

  .edge-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--color-text-warning);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-family: var(--font-mono);
    margin-bottom: 6px;
    margin-top: 10px
  }

  .edge-list {
    display: flex;
    flex-direction: column;
    gap: 4px
  }

  .edge-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 12px
  }

  .edge-trigger {
    color: var(--color-text-danger);
    font-weight: 500;
    min-width: 160px;
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 11px;
    padding-top: 1px
  }

  .edge-resolve {
    color: var(--color-text-secondary);
    flex: 1;
    line-height: 1.5
  }

  .no-results {
    text-align: center;
    padding: 32px;
    color: var(--color-text-tertiary);
    font-size: 13px
  }

  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px
  }

  .stat {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 8px 14px;
    flex: 1;
    text-align: center
  }

  .stat-n {
    font-size: 20px;
    font-weight: 500;
    color: var(--color-text-primary)
  }

  .stat-l {
    font-size: 11px;
    color: var(--color-text-tertiary);
    margin-top: 2px;
    font-family: var(--font-mono)
  }

  @media (max-width: 900px) {
    .stats-row {
      grid-template-columns: repeat(2, 1fr);
      display: grid
    }

    .edge-item {
      flex-direction: column
    }

    .edge-trigger {
      min-width: 0
    }
  }
</style>

  const CATS = DATA.map(d => d.cat);
  let activeCat = null;
  let query = '';
  let openSecs = new Set(CATS);
  let openFlows = new Set();

  function matchFlow(f, q) {
    const s = (f.name + ' ' + f.steps.join(' ') + ' ' + f.edges.map(e => `${e[0]} ${e[1]}`).join(' ')).toLowerCase();
    return s.includes(q.toLowerCase());
  }

  function render() {
    query = document.getElementById('search').value.trim();
    const out = document.getElementById('output');
    let totalFlows = 0, totalEdges = 0, visFlows = 0, visEdges = 0;
    DATA.forEach(sec => sec.flows.forEach(f => { totalFlows++; totalEdges += f.edges.length; }));

    const pills = document.getElementById('filters');
    pills.innerHTML = ['All', ...CATS].map(c => `
    <div class="pill${(activeCat === null && c === 'All') || (activeCat === c) ? ' on' : ''}" onclick="setcat(${JSON.stringify(c)})">${c}</div>
  `).join('');

    let html = '';
    DATA.forEach(sec => {
      if (activeCat && sec.cat !== activeCat) return;
      const matchedFlows = sec.flows.filter(f => !query || matchFlow(f, query));
      if (matchedFlows.length === 0) return;

      visFlows += matchedFlows.length;
      matchedFlows.forEach(f => visEdges += f.edges.length);

      const secId = sec.cat.replace(/\s/g, '_');
      const isOpen = openSecs.has(sec.cat);

      html += `
      <div class="section" id="sec-${secId}">
        <div class="sec-header" onclick="toggleSec(${JSON.stringify(sec.cat)})">
          <div class="sec-left">
            <div class="sec-dot" style="background:${sec.color}"></div>
            <span class="sec-title">${sec.cat}</span>
            <span class="sec-count">${matchedFlows.length} flow${matchedFlows.length !== 1 ? 's' : ''} · ${matchedFlows.reduce((a, f) => a + f.edges.length, 0)} edge cases</span>
          </div>
          <span class="sec-arrow${isOpen ? ' open' : ''}">&#9658;</span>
        </div>
        <div class="sec-body${isOpen ? ' open' : ''}">
    `;

      matchedFlows.forEach(f => {
        const isFlowOpen = openFlows.has(f.id) || !!query;
        html += `
        <div class="flow-card">
          <div class="flow-header" onclick="toggleFlow(${JSON.stringify(f.id)})">
            <div class="flow-left">
              <span class="flow-tag" style="background:${sec.color}22;color:${sec.color};border:0.5px solid ${sec.color}44">${f.id}</span>
              <span class="flow-name">${f.name}</span>
            </div>
            <span class="flow-toggle${isFlowOpen ? ' open' : ''}">&#9658;</span>
          </div>
          <div class="flow-body${isFlowOpen ? ' open' : ''}">
            <div class="happy-path">
              <div class="hp-label">Happy path</div>
              <div class="hp-steps">
                ${f.steps.map((s, i) => `<span class="hp-step">${s}</span>${i < f.steps.length - 1 ? '<span class="hp-arr">→</span>' : ''}`).join('')}
              </div>
            </div>
            <div class="edge-label">Edge cases (${f.edges.length})</div>
            <div class="edge-list">
              ${f.edges.map(e => `
                <div class="edge-item">
                  <span class="edge-trigger">${e[0]}</span>
                  <span class="edge-resolve">${e[1]}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
      });

      html += `</div></div>`;
    });

    if (!html) html = `<div class="no-results">No flows match "${query}"</div>`;
    out.innerHTML = html;

    const stats = document.getElementById('stats');
    stats.innerHTML = `
    <div class="stat"><div class="stat-n">${visFlows}</div><div class="stat-l">flows shown</div></div>
    <div class="stat"><div class="stat-n">${visEdges}</div><div class="stat-l">edge cases</div></div>
    <div class="stat"><div class="stat-n">${totalFlows}</div><div class="stat-l">total flows</div></div>
    <div class="stat"><div class="stat-n">${totalEdges}</div><div class="stat-l">total edge cases</div></div>
  `;
  }

  function setcat(c) {
    activeCat = (c === 'All') ? null : c;
    render();
  }

  function toggleSec(cat) {
    if (openSecs.has(cat)) openSecs.delete(cat); else openSecs.add(cat);
    render();
  }

  function toggleFlow(id) {
    if (openFlows.has(id)) openFlows.delete(id); else openFlows.add(id);
    render();
  }

  render();
</script>
