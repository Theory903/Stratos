services:
  # ── Layer 0: Infrastructure ───────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: stratos-postgres
    environment:
      POSTGRES_USER: stratos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stratos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratos"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: stratos-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: stratos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: stratos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stratos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: stratos-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Use persistent volume path that cp-kafka actually honours
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      # Correct path for confluentinc/cp-kafka (not /bitnami/kafka which is Bitnami)
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Layer 1: Data Fabric ─────────────────────────────────────────────────
  data-fabric:
    build:
      context: .
      dockerfile: infra/docker/data-fabric.Dockerfile
    container_name: stratos-data-fabric
    ports:
      - "8000:8000"
    environment:
      DF_POSTGRES_URL: postgresql+asyncpg://stratos:password@postgres:5432/stratos
      DF_MONGO_URL: mongodb://mongo:27017
      DF_MONGO_DATABASE: stratos
      DF_REDIS_URL: redis://redis:6379/0
      DF_KAFKA_BROKERS: kafka:29092
      DF_S3_ENDPOINT: http://minio:9000
      DF_S3_ACCESS_KEY: minioadmin
      DF_S3_SECRET_KEY: minioadmin
      DF_S3_BUCKET: stratos-data
      DF_QDRANT_URL: http://qdrant:6333
      FRED_API_KEY: ${FRED_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      POLYGON_BASE_URL: ${POLYGON_BASE_URL:-https://api.massive.com}
      MASSIVE_BASE_URL: ${MASSIVE_BASE_URL:-https://api.massive.com}
      UPSTOX_API_KEY: ${UPSTOX_API_KEY:-}
      UPSTOX_BASE_URL: ${UPSTOX_BASE_URL:-https://api.upstox.com}
      COINAPI_API_KEY: ${COINAPI_API_KEY:-}
      COINAPI_BASE_URL: ${COINAPI_BASE_URL:-https://rest.coinapi.io}
      GDELT_BASE_URL: ${GDELT_BASE_URL:-https://api.gdeltproject.org/api/v2}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-stratos-data-fabric/0.1}
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      X_BASE_URL: ${X_BASE_URL:-https://api.x.com/2}
      OANDA_API_KEY: ${OANDA_API_KEY:-}
      WORLD_BANK_BASE_URL: ${WORLD_BANK_BASE_URL:-https://api.worldbank.org/v2}
      SEC_BASE_URL: ${SEC_BASE_URL:-https://data.sec.gov}
      SEC_TICKER_MAP_URL: ${SEC_TICKER_MAP_URL:-https://www.sec.gov/files/company_tickers.json}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-STRATOS Research support@makeuslive.com}
      RBI_RSS_URL: ${RBI_RSS_URL:-https://www.rbi.org.in/Scripts/RSS.aspx?Id=4}
      SEBI_RSS_URL: ${SEBI_RSS_URL:-https://www.sebi.gov.in/sebirss.xml}
      NSE_RSS_URL: ${NSE_RSS_URL:-https://www.nseindia.com/rss-feed}
      BSE_RSS_URL: ${BSE_RSS_URL:-https://www.bseindia.com/rss-feed.xml}
      DF_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  data-fabric-worker:
    build:
      context: .
      dockerfile: infra/docker/data-fabric.Dockerfile
    container_name: stratos-data-fabric-worker
    command: ["python", "-m", "data_fabric.workers.provider_ingest"]
    environment:
      DF_POSTGRES_URL: postgresql+asyncpg://stratos:password@postgres:5432/stratos
      DF_MONGO_URL: mongodb://mongo:27017
      DF_MONGO_DATABASE: stratos
      DF_REDIS_URL: redis://redis:6379/0
      DF_KAFKA_BROKERS: kafka:29092
      DF_S3_ENDPOINT: http://minio:9000
      DF_S3_ACCESS_KEY: minioadmin
      DF_S3_SECRET_KEY: minioadmin
      DF_S3_BUCKET: stratos-data
      DF_QDRANT_URL: http://qdrant:6333
      FRED_API_KEY: ${FRED_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      UPSTOX_API_KEY: ${UPSTOX_API_KEY:-}
      UPSTOX_BASE_URL: ${UPSTOX_BASE_URL:-https://api.upstox.com}
      COINAPI_API_KEY: ${COINAPI_API_KEY:-}
      COINAPI_BASE_URL: ${COINAPI_BASE_URL:-https://rest.coinapi.io}
      GDELT_BASE_URL: ${GDELT_BASE_URL:-https://api.gdeltproject.org/api/v2}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-stratos-data-fabric/0.1}
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      X_BASE_URL: ${X_BASE_URL:-https://api.x.com/2}
      WORLD_BANK_BASE_URL: ${WORLD_BANK_BASE_URL:-https://api.worldbank.org/v2}
      SEC_BASE_URL: ${SEC_BASE_URL:-https://data.sec.gov}
      SEC_TICKER_MAP_URL: ${SEC_TICKER_MAP_URL:-https://www.sec.gov/files/company_tickers.json}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-STRATOS Research support@makeuslive.com}
      RBI_RSS_URL: ${RBI_RSS_URL:-https://www.rbi.org.in/Scripts/RSS.aspx?Id=4}
      SEBI_RSS_URL: ${SEBI_RSS_URL:-https://www.sebi.gov.in/sebirss.xml}
      NSE_RSS_URL: ${NSE_RSS_URL:-https://www.nseindia.com/rss-feed}
      BSE_RSS_URL: ${BSE_RSS_URL:-https://www.bseindia.com/rss-feed.xml}
    depends_on:
      - data-fabric

  data-fabric-feature-worker:
    build:
      context: .
      dockerfile: infra/docker/data-fabric.Dockerfile
    container_name: stratos-data-fabric-feature-worker
    command: ["python", "-m", "data_fabric.workers.feature_builder"]
    environment:
      DF_POSTGRES_URL: postgresql+asyncpg://stratos:password@postgres:5432/stratos
      DF_MONGO_URL: mongodb://mongo:27017
      DF_MONGO_DATABASE: stratos
      DF_REDIS_URL: redis://redis:6379/0
      DF_KAFKA_BROKERS: kafka:29092
      DF_S3_ENDPOINT: http://minio:9000
      DF_S3_ACCESS_KEY: minioadmin
      DF_S3_SECRET_KEY: minioadmin
      DF_S3_BUCKET: stratos-data
      DF_QDRANT_URL: http://qdrant:6333
      FRED_API_KEY: ${FRED_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      UPSTOX_API_KEY: ${UPSTOX_API_KEY:-}
      UPSTOX_BASE_URL: ${UPSTOX_BASE_URL:-https://api.upstox.com}
      COINAPI_API_KEY: ${COINAPI_API_KEY:-}
      COINAPI_BASE_URL: ${COINAPI_BASE_URL:-https://rest.coinapi.io}
      GDELT_BASE_URL: ${GDELT_BASE_URL:-https://api.gdeltproject.org/api/v2}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-stratos-data-fabric/0.1}
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      X_BASE_URL: ${X_BASE_URL:-https://api.x.com/2}
      WORLD_BANK_BASE_URL: ${WORLD_BANK_BASE_URL:-https://api.worldbank.org/v2}
      SEC_BASE_URL: ${SEC_BASE_URL:-https://data.sec.gov}
      SEC_TICKER_MAP_URL: ${SEC_TICKER_MAP_URL:-https://www.sec.gov/files/company_tickers.json}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-STRATOS Research support@makeuslive.com}
      RBI_RSS_URL: ${RBI_RSS_URL:-https://www.rbi.org.in/Scripts/RSS.aspx?Id=4}
      SEBI_RSS_URL: ${SEBI_RSS_URL:-https://www.sebi.gov.in/sebirss.xml}
      NSE_RSS_URL: ${NSE_RSS_URL:-https://www.nseindia.com/rss-feed}
      BSE_RSS_URL: ${BSE_RSS_URL:-https://www.bseindia.com/rss-feed.xml}
    depends_on:
      - data-fabric

  data-fabric-insight-worker:
    build:
      context: .
      dockerfile: infra/docker/data-fabric.Dockerfile
    container_name: stratos-data-fabric-insight-worker
    command: ["python", "-m", "data_fabric.workers.insight_builder"]
    environment:
      DF_POSTGRES_URL: postgresql+asyncpg://stratos:password@postgres:5432/stratos
      DF_MONGO_URL: mongodb://mongo:27017
      DF_MONGO_DATABASE: stratos
      DF_REDIS_URL: redis://redis:6379/0
      DF_KAFKA_BROKERS: kafka:29092
      DF_S3_ENDPOINT: http://minio:9000
      DF_S3_ACCESS_KEY: minioadmin
      DF_S3_SECRET_KEY: minioadmin
      DF_S3_BUCKET: stratos-data
      DF_QDRANT_URL: http://qdrant:6333
      FRED_API_KEY: ${FRED_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      WORLD_BANK_BASE_URL: ${WORLD_BANK_BASE_URL:-https://api.worldbank.org/v2}
      SEC_BASE_URL: ${SEC_BASE_URL:-https://data.sec.gov}
      SEC_TICKER_MAP_URL: ${SEC_TICKER_MAP_URL:-https://www.sec.gov/files/company_tickers.json}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-STRATOS Research support@makeuslive.com}
    depends_on:
      - data-fabric

  data-fabric-refresh-router:
    build:
      context: .
      dockerfile: infra/docker/data-fabric.Dockerfile
    container_name: stratos-data-fabric-refresh-router
    command: ["python", "-m", "data_fabric.workers.refresh_router"]
    environment:
      DF_POSTGRES_URL: postgresql+asyncpg://stratos:password@postgres:5432/stratos
      DF_MONGO_URL: mongodb://mongo:27017
      DF_MONGO_DATABASE: stratos
      DF_REDIS_URL: redis://redis:6379/0
      DF_KAFKA_BROKERS: kafka:29092
      DF_S3_ENDPOINT: http://minio:9000
      DF_S3_ACCESS_KEY: minioadmin
      DF_S3_SECRET_KEY: minioadmin
      DF_S3_BUCKET: stratos-data
      DF_QDRANT_URL: http://qdrant:6333
      FRED_API_KEY: ${FRED_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      WORLD_BANK_BASE_URL: ${WORLD_BANK_BASE_URL:-https://api.worldbank.org/v2}
      SEC_BASE_URL: ${SEC_BASE_URL:-https://data.sec.gov}
      SEC_TICKER_MAP_URL: ${SEC_TICKER_MAP_URL:-https://www.sec.gov/files/company_tickers.json}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-STRATOS Research support@makeuslive.com}
    depends_on:
      - data-fabric

  data-fabric-scheduler:
    build:
      context: .
      dockerfile: infra/docker/data-fabric.Dockerfile
    container_name: stratos-data-fabric-scheduler
    command: ["python", "-m", "data_fabric.workers.scheduler"]
    environment:
      DF_POSTGRES_URL: postgresql+asyncpg://stratos:password@postgres:5432/stratos
      DF_MONGO_URL: mongodb://mongo:27017
      DF_MONGO_DATABASE: stratos
      DF_REDIS_URL: redis://redis:6379/0
      DF_KAFKA_BROKERS: kafka:29092
      DF_S3_ENDPOINT: http://minio:9000
      DF_S3_ACCESS_KEY: minioadmin
      DF_S3_SECRET_KEY: minioadmin
      DF_S3_BUCKET: stratos-data
      DF_QDRANT_URL: http://qdrant:6333
      FRED_API_KEY: ${FRED_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      WORLD_BANK_BASE_URL: ${WORLD_BANK_BASE_URL:-https://api.worldbank.org/v2}
      SEC_BASE_URL: ${SEC_BASE_URL:-https://data.sec.gov}
      SEC_TICKER_MAP_URL: ${SEC_TICKER_MAP_URL:-https://www.sec.gov/files/company_tickers.json}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-STRATOS Research support@makeuslive.com}
    depends_on:
      - data-fabric

  # ── Layer 3: ML Service ──────────────────────────────────────────────────
  ml-service:
    build:
      context: .
      dockerfile: infra/docker/ml.Dockerfile
    container_name: stratos-ml
    ports:
      - "8003:8003"
    environment:
      ML_DATABASE_URL: postgresql+asyncpg://stratos:password@postgres:5432/stratos
      ML_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Layer 4: NLP Service ─────────────────────────────────────────────────
  nlp-service:
    build:
      context: .
      dockerfile: infra/docker/nlp.Dockerfile
    container_name: stratos-nlp
    ports:
      - "8004:8004"
    environment:
      NLP_DEBUG: "false"
      TRANSFORMERS_CACHE: /cache
      HF_HOME: /cache
    volumes:
      - nlp_cache:/cache

  # ── Layer 5: Orchestrator ────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/orchestrator.Dockerfile
    container_name: stratos-orchestrator
    ports:
      - "8005:8005"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ORCHESTRATOR_DATA_FABRIC_URL: http://data-fabric:8000/api/v1
      ORCHESTRATOR_DATA_FABRIC_V2_URL: http://data-fabric:8000/api/v2
      ORCHESTRATOR_ML_SERVICE_URL: http://ml-service:8003/ml
      ORCHESTRATOR_NLP_SERVICE_URL: http://nlp-service:8004/nlp
      ORCHESTRATOR_QDRANT_URL: http://qdrant:6333
      ORCHESTRATOR_LLM_PROVIDER: ${ORCHESTRATOR_LLM_PROVIDER:-ollama}
      ORCHESTRATOR_LANGCHAIN_AGENT_MODEL: ${ORCHESTRATOR_LANGCHAIN_AGENT_MODEL:-}
      ORCHESTRATOR_OLLAMA_MODEL: ${ORCHESTRATOR_OLLAMA_MODEL:-kimi-k2.5:cloud}
      ORCHESTRATOR_OLLAMA_BASE_URL: ${ORCHESTRATOR_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ORCHESTRATOR_OPENAI_MODEL: ${ORCHESTRATOR_OPENAI_MODEL:-gpt-4-turbo-preview}
      ORCHESTRATOR_OPENAI_API_KEY: ${ORCHESTRATOR_OPENAI_API_KEY:-}
      ORCHESTRATOR_GROQ_MODEL: ${ORCHESTRATOR_GROQ_MODEL:-moonshotai/kimi-k2-instruct-0905}
      ORCHESTRATOR_GROQ_API_KEY: ${ORCHESTRATOR_GROQ_API_KEY:-}
      ORCHESTRATOR_GROQ_API_BASE: ${ORCHESTRATOR_GROQ_API_BASE:-https://api.groq.com/openai/v1}
      ORCHESTRATOR_NVIDIA_MODEL: ${ORCHESTRATOR_NVIDIA_MODEL:-nvidia/nemotron-3-super-120b-a12b}
      ORCHESTRATOR_NVIDIA_API_KEY: ${ORCHESTRATOR_NVIDIA_API_KEY:-}
      ORCHESTRATOR_NVIDIA_TEMPERATURE: ${ORCHESTRATOR_NVIDIA_TEMPERATURE:-1.0}
      ORCHESTRATOR_NVIDIA_TOP_P: ${ORCHESTRATOR_NVIDIA_TOP_P:-0.95}
      ORCHESTRATOR_NVIDIA_MAX_TOKENS: ${ORCHESTRATOR_NVIDIA_MAX_TOKENS:-16384}
      ORCHESTRATOR_NVIDIA_REASONING_BUDGET: ${ORCHESTRATOR_NVIDIA_REASONING_BUDGET:-16384}
      ORCHESTRATOR_NVIDIA_ENABLE_THINKING: ${ORCHESTRATOR_NVIDIA_ENABLE_THINKING:-true}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-stratos-orchestrator}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      PYTHONPATH: /app/src
      ORCHESTRATOR_DEBUG: "false"
    volumes:
      - ./orchestrator/src:/app/src
    depends_on:
      - data-fabric
      - ml-service
      - nlp-service

  # ── Layer 6: Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: stratos-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_DATA_FABRIC_URL: http://localhost:8000
      NEXT_PUBLIC_ML_SERVICE_URL: http://localhost:8003/ml
      NEXT_PUBLIC_NLP_SERVICE_URL: http://localhost:8004/nlp
      NEXT_PUBLIC_ORCHESTRATOR_URL: http://localhost:8005
      NEXT_PUBLIC_ENABLE_DEMO: ${NEXT_PUBLIC_ENABLE_DEMO:-false}
    depends_on:
      - orchestrator

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  kafka_data:
  nlp_cache:
  qdrant_data:

networks:
  default:
    name: stratos-network
